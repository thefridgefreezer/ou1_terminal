<!DOCTYPE html>
<html>
<head>
  <title>ARCHIVE</title>
  <link rel="stylesheet" href="style.css">
  </head>
<body>

  <!--BOOT OVERLAY-->
  <div id="boot-screen"></div>
  
  <!--MAIN app-->
  <div id="app" class="hidden">

   <div class="terminal"> <!--used to move all text-->

    <h1>O.U.1 // ARCHIVE NODE</h1>

    <!--PASSWORD BOX-->
    <div id="password-panel" class="ui hidden">
    <h3>WELCOME CAPTAIN</h3>
    <input type="password" id="password-input" placeholder="Enter password">
    <button id="password-submit">CONFIRM</button>
    <button id="password-cancel">CANCEL</button>
    </div>

    <!--TEXT BOX-->
    <div id="text-panel" class="ui hidden">
    <pre id="text-content"></pre>
    <button id="text-close">CLOSE</button>
    </div>

    <div id="loading-panel" class="ui hidden">
    <h3 id="loading-title">ACCESSING ARCHIVE</h3>
    <pre id="loading-text"></pre>
    </div>

    <!--FOLDERS AND FILES-->
    <div class="folder" data-folder="engineering">C:\ENGINEERING</div>
    <div class="files hidden" id="engineering">
    <div class="file" data-audio="assets/audio/test1.mp3">ENGINE LOG 01</div>

    <div class="file locked" data-password="omega" data-type="text" data-file="assets/text/potts1.txt">
    POTTS EMAIL INTERCEPTED
    </div>
    </div>

    <div class="folder" data-folder="security">C:\SECURITY</div>
    <div class="files hidden" id="security">
    <div class="file locked" data-password="omega" data-audio="assets/audio/test1.mp3">SECURITY LOG 01</div>
    </div>

    <div class="folder" data-folder="cronus">G:\PROJECT CRONUS</div>
    <div class="files hidden" id="cronus">
    <div class="file locked" data-password="omega" data-type="text" data-file="assets/text/project_cronus.txt">README.TXT</div>

    </div>

    <!--CLOSE LOG BUTTON-->
    <div id="player-container" class="hidden">
    <audio id="player" controls></audio>
    <button id="close-player">CLOSE LOG</button>
    </div>

    <script src="app.js"></script>

   </div>

</body>
</html>
